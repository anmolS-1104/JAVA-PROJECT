<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Complaint Resolver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<nav class="navbar-ai mb-5 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <h3 class="mb-0 text-white">Complaint.AI</h3>
        <span class="badge bg-success">Neural Engine v2.4 Active</span>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card complaint-card p-4 shadow">
                <h4 class="mb-4 text-secondary">Submit Your Issue</h4>

                <div class="mb-3">
                    <label class="form-label fw-bold text-muted small">DETAILED DESCRIPTION</label>
                    <textarea id="issue" class="form-control" rows="6"
                              placeholder="Type your complaint here... (e.g., 'URGENT: My account is broken!')"></textarea>
                </div>

                <button type="button" class="btn btn-ai w-100 py-3 mb-4" onclick="analyzeComplaint()">
                    START AI ANALYSIS
                </button>

                <div id="aiResult" class="p-4 d-none border-start border-5">
                    <div id="loader" class="text-center">
                        <div class="spinner-grow text-primary" role="status"></div>
                        <p class="mt-2 text-muted">Analyzing sentiment and urgency...</p>
                    </div>

                    <div id="analysisContent" class="d-none">
                        <h5 class="fw-bold mb-3">AI Engine Insights:</h5>
                        <div class="row">
                            <div class="col-sm-6">
                                <p><strong>Priority Level:</strong> <span id="priorityTag"></span></p>
                                <p><strong>Sentiment:</strong> <span id="sentimentTag"></span></p>
                            </div>
                            <div class="col-sm-6">
                                <p><strong>Automated Route:</strong> <span id="routeTag"></span></p>
                                <p><strong>Action Taken:</strong> <span id="actionTag"></span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    function analyzeComplaint() {
        const input = document.getElementById('issue').value.toLowerCase();
        const resultDiv = document.getElementById('aiResult');
        const loader = document.getElementById('loader');
        const content = document.getElementById('analysisContent');

        if (input.length < 10) {
            alert("Please enter at least 10 characters for the AI to process.");
            return;
        }

        // Reset and Show Loader
        resultDiv.classList.remove('d-none');
        loader.classList.remove('d-none');
        content.classList.add('d-none');
        resultDiv.style.borderColor = "#dee2e6"; // Neutral gray during load

        // Artificial Delay to simulate "AI Thinking"
        setTimeout(() => {
            loader.classList.add('d-none');
            content.classList.remove('d-none');

            // --- CONDITION 1: URGENT / BROKEN ---
            if (input.includes("urgent") || input.includes("broken") || input.includes("not working")) {
                updateUI("HIGH", "Frustrated / Critical", "Technical Escalation", "Assigned to Senior Engineer", "red");
            }
            // --- CONDITION 2: POSITIVE / THANKS ---
            else if (input.includes("thanks") || input.includes("happy") || input.includes("good")) {
                updateUI("LOW", "Positive / Satisfied", "Customer Relations", "Archived in Testimonials", "green");
            }
            // --- CONDITION 3: MONEY / PAYMENT ---
            else if (input.includes("money") || input.includes("refund") || input.includes("payment")) {
                updateUI("MEDIUM", "Anxious", "Billing Dept", "Payment Verification Started", "orange");
            }
            // --- CONDITION 4: DEFAULT / NEUTRAL ---
            else {
                updateUI("ROUTINE", "Neutral", "General Support", "Queue Position: #42", "blue");
            }
        }, 1200);
    }

    function updateUI(prio, sent, route, action, colorCode) {
        const resultDiv = document.getElementById('aiResult');
        const colors = {
            red: "#dc3545",
            green: "#198754",
            orange: "#fd7e14",
            blue: "#0d6efd"
        };

        document.getElementById('priorityTag').innerHTML = `<span class="badge" style="background-color:${colors[colorCode]}">${prio}</span>`;
        document.getElementById('sentimentTag').innerText = sent;
        document.getElementById('routeTag').innerText = route;
        document.getElementById('actionTag').innerText = action;

        // Change the border color of the result box based on priority
        resultDiv.style.borderColor = colors[colorCode];
    }
</script>

</body>
</html>
