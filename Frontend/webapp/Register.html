<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICRS - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .register-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
        }
        .register-header { text-align: center; margin-bottom: 24px; }
        .register-header h1 { font-size: 1.5rem; color: #1a73e8; font-weight: 700; }
        .register-header p { color: #777; font-size: 0.88rem; margin-top: 6px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 10px 12px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 0.95rem; font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #1a73e8; }
        .btn-register {
            width: 100%; padding: 11px; background-color: #1a73e8;
            color: white; border: none; border-radius: 4px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            margin-top: 8px; transition: background-color 0.2s;
        }
        .btn-register:hover { background-color: #1558b0; }
        .btn-register:disabled { background-color: #a0bce8; cursor: not-allowed; }
        .msg-error {
            background-color: #fce8e6; color: #c5221f;
            border: 1px solid #f5c6c4; border-radius: 4px;
            padding: 10px 14px; margin-bottom: 14px; font-size: 0.88rem; display: none;
        }
        .msg-success {
            background-color: #e6f4ea; color: #137333;
            border: 1px solid #b7dfbf; border-radius: 4px;
            padding: 10px 14px; margin-bottom: 14px; font-size: 0.88rem; display: none;
        }
        .login-link { text-align: center; margin-top: 18px; font-size: 0.85rem; color: #777; }
        .login-link a { color: #1a73e8; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-header">
        <h1>ICRS</h1>
        <p>Create a Customer Account</p>
    </div>

    <div class="msg-error" id="errorMsg"></div>
    <div class="msg-success" id="successMsg"></div>

    <div class="form-group">
        <label for="name">Full Name <span style="color:red;">*</span></label>
        <input type="text" id="name" placeholder="Your full name">
    </div>

    <div class="form-group">
        <label for="email">Email <span style="color:red;">*</span></label>
        <input type="email" id="email" placeholder="Your email address">
    </div>

    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Your phone number (optional)">
    </div>

    <div class="form-group">
        <label for="password">Password <span style="color:red;">*</span></label>
        <input type="password" id="password" placeholder="Choose a password">
    </div>

    <div class="form-group">
        <label for="confirmPassword">Confirm Password <span style="color:red;">*</span></label>
        <input type="password" id="confirmPassword" placeholder="Re-enter your password">
    </div>

    <button class="btn-register" id="registerBtn" onclick="handleRegister()">Create Account</button>

    <div class="login-link">
        Already have an account? <a href="login.html">Login here</a>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:8080";

    async function handleRegister() {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");
        errorMsg.style.display = "none";
        successMsg.style.display = "none";

        // Validate
        if (!name) { showError("Name is required."); return; }
        if (!email || !email.includes("@")) { showError("A valid email is required."); return; }
        if (!password || password.length < 6) { showError("Password must be at least 6 characters."); return; }
        if (password !== confirmPassword) { showError("Passwords do not match."); return; }

        const btn = document.getElementById("registerBtn");
        btn.disabled = true;
        btn.textContent = "Creating account...";

        // Construct the JSON payload to match the backend User model
        const payload = {
            fullName: name,
            email: email,
            password: password,
            phone: phone || ""
        };

        try {
            // Updated fetch to send JSON in the request body
            const response = await fetch(API_BASE + "/api/users/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || "Registration failed.");
            }

            successMsg.textContent = "Account created! Redirecting to login...";
            successMsg.style.display = "block";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1800);

        } catch (err) {
            showError(err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = "Create Account";
        }
    }

    function showError(message) {
        const el = document.getElementById("errorMsg");
        el.textContent = message;
        el.style.display = "block";
    }

    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") handleRegister();
    });
</script>

</body>
</html>
