<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name = "viewport" content = "width = device-width, initial-scale = 1">
    <title> ICRS - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-header h1 {
            font-size: 1.5rem;
            color: #1a73e8;
            font-weight: 700;
        }

        .login-header p {
            color: #777;
            font-size: 0.88rem;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #1558b0;
        }

        .btn-login:disabled {
            background-color: #a0bce8;
            cursor: not-allowed;
        }

        .msg-error {
            background-color: #fce8e6;
            color: #c5221f;
            border: 1px solid #f5c6c4;
            border-radius: 4px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: 0.88rem;
            display: none;
        }

        .register-link {
            text-align: center;
            margin-top: 18px;
            font-size: 0.85rem;
            color: #777;
        }

        .register-link a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
        }

    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h1>ICRS</h1>
        <p>Intelligent Complaint Resolution System</p>
    </div>

    <div class="msg-error" id="errorMsg"></div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
    </div>

    <div class="form-group">
        <label for="role">Login as</label>
        <select id="role">
            <option value="">-- Select Role --</option>
            <option value="CUSTOMER">Customer</option>
            <option value="AGENT">Agent</option>
        </select>
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Login</button>

    <div class="register-link">
        New customer? <a href="register.html">Register here</a>
    </div>
</div>
<script>
    // If already logged in, redirect
    const existingRole = sessionStorage.getItem("userRole");
    if (existingRole === "CUSTOMER") window.location.href = "customer-dashboard.html";
    if (existingRole === "AGENT") window.location.href = "agent-dashboard.html";

    async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const role = document.getElementById("role").value;
        const errorMsg = document.getElementById("errorMsg");
        const loginBtn = document.getElementById("loginBtn");

        errorMsg.style.display = "none";

        // Basic validation
        if (!email || !password || !role) {
            errorMsg.textContent = "Please fill in all fields.";
            errorMsg.style.display = "block";
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        try {
            const response = await fetch("http://localhost:8080/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password, role })
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || "Login failed. Please check your credentials.");
            }

            const user = await response.json();

            // Validate that the selected role matches the account role
            if (user.role !== role) {
                throw new Error("Selected role does not match your account.");
            }

            // Save session
            sessionStorage.setItem("userId", user.id);
            sessionStorage.setItem("userName", user.name);
            sessionStorage.setItem("userRole", user.role);

            // Redirect based on role
            if (user.role === "CUSTOMER") {
                window.location.href = "customer-dashboard.html";
            } else if (user.role === "AGENT") {
                window.location.href = "agent-dashboard.html";
            }

        } catch (err) {
            errorMsg.textContent = err.message;
            errorMsg.style.display = "block";
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = "Login";
        }
    }

    // Allow pressing Enter to login
    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") handleLogin();
    });
</script>
</body>
</html>
